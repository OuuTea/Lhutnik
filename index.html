<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lhůtník BOZP a PO - Ing. Ondřej Toman</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .bg-gold-gradient { background: linear-gradient(135deg, #d4af37 0%, #f1c40f 100%); }
        .text-gold { color: #d4af37; }
        .btn-gold { 
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
            transition: all 0.3s ease;
        }
        .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4); }
        .card-dark { background-color: #1f2937; color: #f3f4f6; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">

    <div id="loader" class="hidden fixed inset-0 bg-black bg-opacity-70 flex justify-center items-center z-50">
        <div class="flex flex-col items-center">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-gold mb-4"></div>
            <span class="font-semibold text-gold">Pracuji...</span>
        </div>
    </div>

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        
        <div id="login-screen" class="mt-20 card-dark p-8 rounded-2xl shadow-2xl max-w-md mx-auto border border-gray-700">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gold">Lhůtník BOZP</h1>
                <p class="text-gray-400 mt-2">Ing. Ondřej Toman</p>
            </div>
            <form id="login-form" class="space-y-5">
                <input type="email" id="email" class="w-full bg-gray-800 border border-gray-600 rounded-lg p-3 outline-none focus:border-gold" placeholder="E-mail" required>
                <input type="password" id="password" class="w-full bg-gray-800 border border-gray-600 rounded-lg p-3 outline-none focus:border-gold" placeholder="Heslo" required>
                <button type="submit" class="w-full btn-gold text-gray-900 font-bold p-3 rounded-lg mt-4 uppercase">Vstoupit</button>
            </form>
        </div>

        <div id="admin-screen" class="hidden space-y-8 animate-fadeIn">
            <header class="flex justify-between items-center bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-xl">
                <div>
                    <h2 class="text-2xl font-bold">Centrální správa</h2>
                    <p class="text-gold text-sm font-semibold">Ing. Ondřej Toman</p>
                </div>
                <button onclick="logout()" class="px-6 py-2 border border-red-500 text-red-500 rounded-full hover:bg-red-500 hover:text-white transition text-xs font-bold uppercase">Odhlásit</button>
            </header>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-1 space-y-6">
                    <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-lg">
                        <h3 class="text-lg font-bold mb-4 text-gold uppercase tracking-wider text-sm">Nová firma</h3>
                        <form id="add-company-form" class="space-y-3">
                            <input type="text" id="comp-name" placeholder="Název firmy" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-lg text-sm outline-none focus:border-gold" required>
                            <input type="email" id="comp-email" placeholder="E-mail" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-lg text-sm outline-none focus:border-gold" required>
                            <input type="text" id="comp-pass" placeholder="Heslo" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-lg text-sm outline-none focus:border-gold" required>
                            <button type="submit" class="w-full btn-gold text-gray-900 font-bold py-3 rounded-lg text-xs uppercase">Vytvořit</button>
                        </form>
                    </div>

                    <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-lg">
                        <h3 class="text-lg font-bold mb-4 text-gold uppercase tracking-wider text-sm">Nový termín</h3>
                        <form id="add-task-form" class="space-y-3">
                            <select id="task-company" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-lg text-sm outline-none focus:border-gold text-gray-400" required></select>
                            <input type="text" id="task-title" placeholder="Název revize/školení" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-lg text-sm outline-none focus:border-gold" required>
                            <div class="flex gap-2">
                                <input type="date" id="task-date" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-lg text-sm outline-none focus:border-gold text-gray-400" required>
                                <input type="number" id="task-period" placeholder="Mes." class="w-20 bg-gray-900 border border-gray-700 p-3 rounded-lg text-sm outline-none focus:border-gold" required title="Perioda v měsících">
                            </div>
                            <button type="submit" class="w-full btn-gold text-gray-900 font-bold py-3 rounded-lg text-xs uppercase">Uložit lhůtu</button>
                        </form>
                    </div>
                </div>

                <div class="lg:col-span-2 bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-lg">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                        <h3 class="text-xl font-bold">Přehled všech lhůt</h3>
                        <div class="relative w-full md:w-64">
                            <input type="text" id="admin-search" onkeyup="filterAdminTasks()" placeholder="Hledat firmu..." class="w-full bg-gray-900 border border-gray-600 p-2 pl-9 rounded-full text-sm outline-none focus:border-gold transition-all">
                            <svg class="w-4 h-4 text-gray-500 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        </div>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-left" id="admin-table">
                            <thead class="bg-gray-900 text-gold uppercase text-[10px] tracking-widest">
                                <tr>
                                    <th class="p-4 rounded-tl-lg">Společnost</th>
                                    <th class="p-4">Záznam</th>
                                    <th class="p-4">Datum</th>
                                    <th class="p-4 rounded-tr-lg text-center">Perioda</th>
                                </tr>
                            </thead>
                            <tbody id="admin-tasks-list" class="divide-y divide-gray-700 text-xs">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div id="client-screen" class="hidden space-y-8 animate-fadeIn">
            <header class="flex justify-between items-center bg-gray-800 p-6 rounded-2xl border border-gold shadow-2xl">
                <div>
                    <h2 class="text-2xl font-bold text-gold" id="client-company-name"></h2>
                    <p class="text-gray-400 text-sm uppercase tracking-widest">Klientský portál</p>
                </div>
                <button onclick="logout()" class="px-6 py-2 border border-gray-500 text-gray-400 rounded-full hover:bg-gray-700 transition text-xs">Odhlásit</button>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <button onclick="openRequestModal('Školení')" class="btn-gold text-gray-900 p-6 rounded-2xl shadow-lg font-bold text-lg">📢 POPTAT ŠKOLENÍ</button>
                <button onclick="openRequestModal('Revize')" class="bg-gray-700 text-gold border border-gold p-6 rounded-2xl shadow-lg font-bold text-lg hover:bg-gray-600 transition">🛠️ POPTAT REVIZI</button>
            </div>

            <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-lg overflow-x-auto">
                <h3 class="text-xl font-semibold mb-6">Vaše nadcházející lhůty</h3>
                <table class="w-full text-left text-sm">
                    <thead class="bg-gray-900 text-gray-400">
                        <tr><th class="p-4">Název</th><th class="p-4">Termín</th><th class="p-4">Perioda</th><th class="p-4">Stav</th></tr>
                    </thead>
                    <tbody id="client-tasks-list" class="divide-y divide-gray-700"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="request-modal" class="hidden fixed inset-0 bg-black bg-opacity-80 flex justify-center items-center z-50 p-4 backdrop-blur-sm">
        <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gold">
            <h3 id="modal-title" class="text-2xl font-bold mb-6 text-gold text-center">Nová poptávka</h3>
            <form id="request-form" class="space-y-4 text-sm">
                <input type="hidden" id="req-type">
                <input type="text" id="req-detail" placeholder="Předmět" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-lg outline-none focus:border-gold" required>
                <div id="group-people"><input type="number" id="req-people" placeholder="Počet osob" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-lg outline-none focus:border-gold"></div>
                <input type="text" id="req-place" placeholder="Místo" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-lg outline-none focus:border-gold" required>
                <div class="grid grid-cols-2 gap-4">
                    <input type="date" id="req-date" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-lg outline-none focus:border-gold text-gray-400" required>
                    <input type="time" id="req-time" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-lg outline-none focus:border-gold text-gray-400" required>
                </div>
                <div class="flex gap-4 mt-8">
                    <button type="button" onclick="closeRequestModal()" class="flex-1 bg-gray-700 p-3 rounded-lg">Zavřít</button>
                    <button type="submit" class="flex-1 btn-gold text-gray-900 p-3 rounded-lg font-bold uppercase">Odeslat</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbx6e9SC3eu8CUQEJkBNtC_qiGxE9B8yRAVVUkkE7YOXD73bIJ0Mp0CEpmk7E3bZvfYI/exec'; // Sem vlož své URL z Apps Scriptu

        let currentUser = null;

        function showLoader(show) { document.getElementById('loader').classList.toggle('hidden', !show); }

        async function apiCall(data) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(data)
                });
                return await response.json();
            } catch (e) {
                console.error(e);
                return { success: false };
            }
        }

        function showScreen(name) {
            ['login-screen', 'admin-screen', 'client-screen'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById(name + '-screen').classList.remove('hidden');
        }

        function logout() { currentUser = null; showScreen('login'); }

        // --- FILTR PRO ADMINA ---
        function filterAdminTasks() {
            const input = document.getElementById('admin-search');
            const filter = input.value.toLowerCase();
            const tbody = document.getElementById('admin-tasks-list');
            const rows = tbody.getElementsByTagName('tr');

            for (let i = 0; i < rows.length; i++) {
                const companyCell = rows[i].getElementsByTagName('td')[0];
                if (companyCell) {
                    const textValue = companyCell.textContent || companyCell.innerText;
                    rows[i].style.display = textValue.toLowerCase().indexOf(filter) > -1 ? "" : "none";
                }
            }
        }

        // --- ADMIN INIT ---
        async function initAdmin() {
            showLoader(true);
            const res = await apiCall({ action: 'get_admin_data' });
            showLoader(false);
            if (res.success) {
                const select = document.getElementById('task-company');
                select.innerHTML = '<option value="">Vyber firmu...</option>';
                res.clients.forEach(c => select.innerHTML += `<option value="${c.email}">${c.companyName}</option>`);
                
                const tbody = document.getElementById('admin-tasks-list');
                tbody.innerHTML = '';
                
                // Řazení podle data (nejbližší nahoře)
                res.tasks.sort((a,b) => new Date(a.date) - new Date(b.date)).forEach(t => {
                    const client = res.clients.find(c => c.email === t.companyEmail);
                    const d = new Date(t.date);
                    tbody.innerHTML += `<tr class="border-b border-gray-700 hover:bg-gray-700 transition">
                        <td class="p-4 font-bold text-gold">${client ? client.companyName : 'Neznámý'}</td>
                        <td class="p-4 text-gray-300">${t.title}</td>
                        <td class="p-4 font-mono">${d.toLocaleDateString('cs-CZ')}</td>
                        <td class="p-4 text-center text-gray-500">${t.period} m</td>
                    </tr>`;
                });
            }
        }

        // --- ZBYTEK LOGIKY (Zůstává stejný) ---
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            showLoader(true);
            const res = await apiCall({ action: 'login', email: document.getElementById('email').value, password: document.getElementById('password').value });
            showLoader(false);
            if (res.success) {
                currentUser = res.user;
                showScreen(currentUser.role);
                currentUser.role === 'admin' ? initAdmin() : initClient();
            } else { alert("Chyba přihlášení."); }
        });

        document.getElementById('add-company-form').addEventListener('submit', async (e) => {
            e.preventDefault(); showLoader(true);
            await apiCall({ action: 'add_user', companyName: document.getElementById('comp-name').value, email: document.getElementById('comp-email').value, password: document.getElementById('comp-pass').value });
            showLoader(false); e.target.reset(); initAdmin();
        });

        document.getElementById('add-task-form').addEventListener('submit', async (e) => {
            e.preventDefault(); showLoader(true);
            await apiCall({ action: 'add_task', companyEmail: document.getElementById('task-company').value, title: document.getElementById('task-title').value, date: document.getElementById('task-date').value, period: document.getElementById('task-period').value });
            showLoader(false); e.target.reset(); initAdmin();
        });

        async function initClient() {
            document.getElementById('client-company-name').innerText = currentUser.companyName;
            showLoader(true);
            const res = await apiCall({ action: 'get_client_data', email: currentUser.email });
            showLoader(false);
            if (res.success) {
                const tbody = document.getElementById('client-tasks-list');
                tbody.innerHTML = '';
                res.tasks.sort((a,b) => new Date(a.date) - new Date(b.date)).forEach(t => {
                    const d = new Date(t.date);
                    tbody.innerHTML += `<tr class="border-b border-gray-700">
                        <td class="p-4 font-medium">${t.title}</td>
                        <td class="p-4 font-mono">${d.toLocaleDateString('cs-CZ')}</td>
                        <td class="p-4 text-gray-400">${t.period} m</td>
                        <td class="p-4 text-xs text-green-400 uppercase tracking-tighter">Aktivní</td>
                    </tr>`;
                });
            }
        }

        function openRequestModal(type) {
            document.getElementById('req-type').value = type;
            document.getElementById('modal-title').innerText = 'Poptávka: ' + type;
            document.getElementById('group-people').style.display = type === 'Školení' ? 'block' : 'none';
            document.getElementById('request-modal').classList.remove('hidden');
        }
        function closeRequestModal() { document.getElementById('request-modal').classList.add('hidden'); }

        document.getElementById('request-form').addEventListener('submit', async (e) => {
            e.preventDefault(); showLoader(true);
            await apiCall({ action: 'send_request', companyName: currentUser.companyName, email: currentUser.email, type: document.getElementById('req-type').value, detail: document.getElementById('req-detail').value, people: document.getElementById('req-people').value, place: document.getElementById('req-place').value, date: document.getElementById('req-date').value, time: document.getElementById('req-time').value });
            showLoader(false); closeRequestModal(); alert("Odesláno!");
        });
    </script>
</body>
</html>
