<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lhůtník BOZP a PO - Ing. Ondřej Toman</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .text-gold { color: #d4af37; }
        .bg-gold { background-color: #d4af37; }
        .border-gold { border-color: #d4af37; }
        .btn-gold { 
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%);
            transition: all 0.3s ease;
            color: #111827;
        }
        .btn-gold:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3); }
        .animate-fadeIn { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">

    <div id="loader" class="hidden fixed inset-0 bg-black bg-opacity-70 flex justify-center items-center z-50 text-gold font-bold">
        <div class="flex flex-col items-center">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-gold mb-2"></div>
            Načítám...
        </div>
    </div>

    <div class="max-w-6xl mx-auto p-4 md:p-8">
        
        <div id="login-screen" class="mt-20 bg-gray-800 p-8 rounded-2xl shadow-2xl max-w-md mx-auto border border-gray-700">
            <h1 class="text-3xl font-bold text-center text-gold mb-2">Lhůtník BOZP</h1>
            <p class="text-center text-gray-500 mb-8 text-sm uppercase tracking-widest">Ing. Ondřej Toman</p>
            <form id="login-form" class="space-y-4">
                <input type="email" id="email" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 outline-none focus:border-gold transition" placeholder="E-mail" required>
                <input type="password" id="password" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 outline-none focus:border-gold transition" placeholder="Heslo" required>
                <button type="submit" class="w-full btn-gold font-bold p-3 rounded-lg uppercase tracking-wider mt-4">Přihlásit se</button>
            </form>
        </div>

        <div id="admin-screen" class="hidden space-y-8 animate-fadeIn">
            <div class="flex justify-between items-center bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-xl">
                <h2 class="text-2xl font-bold">Administrace <span class="text-gold">BOZP</span></h2>
                <button onclick="logout()" class="text-red-400 hover:text-red-300 text-sm font-bold uppercase tracking-tighter">Odhlásit</button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="space-y-6">
                    <div class="bg-gray-800 p-5 rounded-xl border border-gray-700">
                        <h3 class="text-gold font-bold mb-4 uppercase text-xs">Nová společnost</h3>
                        <form id="add-company-form" class="space-y-3">
                            <input type="text" id="comp-name" placeholder="Název firmy" class="w-full bg-gray-900 border border-gray-700 p-2 rounded text-sm outline-none focus:border-gold" required>
                            <input type="email" id="comp-email" placeholder="E-mail" class="w-full bg-gray-900 border border-gray-700 p-2 rounded text-sm outline-none focus:border-gold" required>
                            <input type="text" id="comp-pass" placeholder="Heslo" class="w-full bg-gray-900 border border-gray-700 p-2 rounded text-sm outline-none focus:border-gold" required>
                            <button type="submit" class="w-full btn-gold py-2 rounded text-xs font-bold uppercase">Založit firmu</button>
                        </form>
                    </div>
                    <div class="bg-gray-800 p-5 rounded-xl border border-gray-700">
                        <h3 class="text-gold font-bold mb-4 uppercase text-xs">Nový termín</h3>
                        <form id="add-task-form" class="space-y-3">
                            <select id="task-company" class="w-full bg-gray-900 border border-gray-700 p-2 rounded text-sm outline-none focus:border-gold text-gray-400" required></select>
                            <input type="text" id="task-title" placeholder="Předmět (revize...)" class="w-full bg-gray-900 border border-gray-700 p-2 rounded text-sm outline-none focus:border-gold" required>
                            <div class="flex gap-2">
                                <input type="date" id="task-date" class="w-full bg-gray-900 border border-gray-700 p-2 rounded text-sm outline-none text-gray-400" required>
                                <input type="number" id="task-period" placeholder="Měs." class="w-16 bg-gray-900 border border-gray-700 p-2 rounded text-sm outline-none focus:border-gold" required>
                            </div>
                            <button type="submit" class="w-full btn-gold py-2 rounded text-xs font-bold uppercase">Uložit termín</button>
                        </form>
                    </div>
                </div>

                <div class="lg:col-span-2 bg-gray-800 p-6 rounded-xl border border-gray-700 overflow-hidden">
                    <div class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4">
                        <h3 class="font-bold">Všechny lhůty</h3>
                        <input type="text" id="admin-search" onkeyup="filterAdminTasks()" placeholder="Hledat firmu..." class="bg-gray-900 border border-gray-600 p-2 px-4 rounded-full text-sm outline-none focus:border-gold w-full sm:w-auto transition-all">
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-xs" id="admin-table">
                            <thead class="bg-gray-900 text-gold uppercase tracking-widest italic">
                                <tr>
                                    <th class="p-3">Firma</th>
                                    <th class="p-3">Předmět</th>
                                    <th class="p-3">Datum</th>
                                    <th class="p-3">Perioda</th>
                                </tr>
                            </thead>
                            <tbody id="admin-tasks-list" class="divide-y divide-gray-700"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div id="client-screen" class="hidden space-y-6 animate-fadeIn">
            <div class="flex justify-between items-center bg-gray-800 p-6 rounded-2xl border border-gold">
                <div>
                    <h2 class="text-2xl font-bold text-gold" id="client-company-name"></h2>
                    <p class="text-gray-500 text-xs uppercase tracking-widest">Klientská zóna</p>
                </div>
                <button onclick="logout()" class="text-gray-400 hover:text-white text-xs uppercase">Odhlásit</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <button onclick="openRequestModal('Školení')" class="btn-gold p-5 rounded-xl font-bold text-lg shadow-lg">📢 POPTAT ŠKOLENÍ</button>
                <button onclick="openRequestModal('Revize')" class="bg-gray-700 text-gold border border-gold p-5 rounded-xl font-bold text-lg hover:bg-gray-600 transition">🛠️ POPTAT REVIZI</button>
            </div>

            <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-lg">
                <h3 class="font-bold mb-4 flex items-center"><span class="w-1 h-5 bg-gold mr-2"></span>Vaše termíny</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-gray-900 text-gray-500 uppercase text-[10px]">
                            <tr><th class="p-3">Název</th><th class="p-3">Termín</th><th class="p-3">Stav</th></tr>
                        </thead>
                        <tbody id="client-tasks-list" class="divide-y divide-gray-700"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="request-modal" class="hidden fixed inset-0 bg-black bg-opacity-80 flex justify-center items-center z-50 p-4 backdrop-blur-sm">
        <div class="bg-gray-800 p-6 rounded-2xl w-full max-w-md border border-gold shadow-2xl">
            <h3 id="modal-title" class="text-xl font-bold mb-6 text-gold text-center">Nová poptávka</h3>
            <form id="request-form" class="space-y-4 text-sm">
                <input type="hidden" id="req-type">
                <input type="text" id="req-detail" placeholder="Předmět (např. Školení řidičů)" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-lg outline-none focus:border-gold text-white" required>
                <div id="group-people"><input type="number" id="req-people" placeholder="Počet osob" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-lg outline-none focus:border-gold text-white"></div>
                <input type="text" id="req-place" placeholder="Místo konání" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-lg outline-none focus:border-gold text-white" required>
                <div class="grid grid-cols-2 gap-4">
                    <input type="date" id="req-date" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-lg text-gray-400 outline-none" required>
                    <input type="time" id="req-time" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-lg text-gray-400 outline-none" required>
                </div>
                <div class="flex gap-3 mt-6">
                    <button type="button" onclick="closeRequestModal()" class="flex-1 bg-gray-700 py-3 rounded-lg text-xs font-bold uppercase">Zrušit</button>
                    <button type="submit" class="flex-1 btn-gold py-3 rounded-lg text-xs font-bold uppercase">Odeslat</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // --- !!! ZDE VLOŽ SVOU URL ADRESU !!! ---
        const API_URL = 'https://script.google.com/macros/s/AKfycbx6e9SC3eu8CUQEJkBNtC_qiGxE9B8yRAVVUkkE7YOXD73bIJ0Mp0CEpmk7E3bZvfYI/exec'; 

        let currentUser = null;

        function showLoader(show) { document.getElementById('loader').classList.toggle('hidden', !show); }

        async function apiCall(data) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(data)
                });
                return await response.json();
            } catch (e) {
                console.error("API Error:", e);
                alert("Chyba spojení se serverem. Zkontrolujte URL v kódu.");
                return { success: false };
            }
        }

        function showScreen(name) {
            ['login-screen', 'admin-screen', 'client-screen'].forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById(name + '-screen').classList.remove('hidden');
        }

        function logout() { currentUser = null; showScreen('login'); document.getElementById('login-form').reset(); }

        // LOGIN
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            showLoader(true);
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const res = await apiCall({ action: 'login', email: email, password: password });
            showLoader(false);
            
            if (res.success) {
                currentUser = res.user;
                showScreen(currentUser.role);
                currentUser.role === 'admin' ? initAdmin() : initClient();
            } else { 
                alert(res.message || "Nesprávné údaje."); 
            }
        });

        // ADMIN FILTR
        function filterAdminTasks() {
            const filter = document.getElementById('admin-search').value.toLowerCase();
            const rows = document.getElementById('admin-tasks-list').getElementsByTagName('tr');
            for (let row of rows) {
                row.style.display = row.innerText.toLowerCase().includes(filter) ? "" : "none";
            }
        }

        async function initAdmin() {
            showLoader(true);
            const res = await apiCall({ action: 'get_admin_data' });
            showLoader(false);
            if (res.success) {
                const select = document.getElementById('task-company');
                select.innerHTML = '<option value="">Vybrat firmu...</option>';
                res.clients.forEach(c => select.innerHTML += `<option value="${c.email}">${c.companyName}</option>`);
                
                const tbody = document.getElementById('admin-tasks-list');
                tbody.innerHTML = '';
                res.tasks.sort((a,b) => new Date(a.date) - new Date(b.date)).forEach(t => {
                    const client = res.clients.find(c => c.email === t.companyEmail);
                    tbody.innerHTML += `<tr class="border-b border-gray-700 hover:bg-gray-750 transition">
                        <td class="p-3 text-gold font-bold">${client ? client.companyName : '???'}</td>
                        <td class="p-3 text-gray-300">${t.title}</td>
                        <td class="p-3 font-mono">${new Date(t.date).toLocaleDateString('cs-CZ')}</td>
                        <td class="p-3 text-gray-500">${t.period} m.</td>
                    </tr>`;
                });
            }
        }

        // AKCE ADMIN
        document.getElementById('add-company-form').addEventListener('submit', async (e) => {
            e.preventDefault(); showLoader(true);
            await apiCall({ action: 'add_user', companyName: document.getElementById('comp-name').value, email: document.getElementById('comp-email').value, password: document.getElementById('comp-pass').value });
            showLoader(false); e.target.reset(); initAdmin();
        });

        document.getElementById('add-task-form').addEventListener('submit', async (e) => {
            e.preventDefault(); showLoader(true);
            await apiCall({ action: 'add_task', companyEmail: document.getElementById('task-company').value, title: document.getElementById('task-title').value, date: document.getElementById('task-date').value, period: document.getElementById('task-period').value });
            showLoader(false); e.target.reset(); initAdmin();
        });

        // CLIENT INIT
        async function initClient() {
            document.getElementById('client-company-name').innerText = currentUser.companyName;
            showLoader(true);
            const res = await apiCall({ action: 'get_client_data', email: currentUser.email });
            showLoader(false);
            if (res.success) {
                const tbody = document.getElementById('client-tasks-list');
                tbody.innerHTML = '';
                const today = new Date();
                res.tasks.sort((a,b) => new Date(a.date) - new Date(b.date)).forEach(t => {
                    const d = new Date(t.date);
                    const diff = Math.ceil((d - today) / (1000*60*60*24));
                    let color = 'text-green-400';
                    if (diff < 0) color = 'text-red-500 font-bold animate-pulse';
                    else if (diff <= 30) color = 'text-orange-400';
                    
                    tbody.innerHTML += `<tr>
                        <td class="p-3 font-semibold">${t.title}</td>
                        <td class="p-3 font-mono">${d.toLocaleDateString('cs-CZ')}</td>
                        <td class="p-3 text-xs uppercase ${color}">${diff < 0 ? 'Po termínu' : (diff <= 30 ? 'Blíží se' : 'V pořádku')}</td>
                    </tr>`;
                });
            }
        }

        function openRequestModal(type) {
            document.getElementById('req-type').value = type;
            document.getElementById('modal-title').innerText = 'Poptávka: ' + type;
            document.getElementById('group-people').style.display = type === 'Školení' ? 'block' : 'none';
            document.getElementById('request-modal').classList.remove('hidden');
        }
        function closeRequestModal() { document.getElementById('request-modal').classList.add('hidden'); }

        document.getElementById('request-form').addEventListener('submit', async (e) => {
            e.preventDefault(); showLoader(true);
            const res = await apiCall({ 
                action: 'send_request', 
                companyName: currentUser.companyName, 
                email: currentUser.email, 
                type: document.getElementById('req-type').value, 
                detail: document.getElementById('req-detail').value, 
                people: document.getElementById('req-people').value, 
                place: document.getElementById('req-place').value, 
                date: document.getElementById('req-date').value, 
                time: document.getElementById('req-time').value 
            });
            showLoader(false);
            if (res.success) { alert("Poptávka odeslána!"); closeRequestModal(); e.target.reset(); }
        });
    </script>
</body>
</html>
